{% extends "base.html" %}

{% block title %}
Nueva Feria
{% endblock %}

{% block content %}

<h2>Nueva Feria</h2>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button
        type="submit"
        class="btn btn-success">
        Guardar
    </button>

    <a href="{% url 'ferias:lista_ferias' %}"
       class="btn btn-secondary">
       Cancelar
    </a>

</form>

{% endblock %}
