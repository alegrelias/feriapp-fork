{% extends "base.html" %}

{% block content %}

<div class="form-wrapper">
    <div class="form-container">
        <h2>Nueva Inscripción</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                        <span class="error-text">{{ error }}</span>
                    {% endfor %}
                </div>
            {% endfor %}

            <button type="submit" class="btn-submit">Inscribirse</button>
        </form>
    </div>
</div>




<style>
    .form-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .form-container {
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 450px;
    }
    .form-container h2 {
        margin-top: 0;
        margin-bottom: 25px;
        color: #2c3e50;
        font-size: 24px;
        text-align: center;
    }
    .form-group {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
    }
    .form-group label {
        font-size: 14px;
        font-weight: 600;
        color: #5a738e;
        margin-bottom: 8px;
    }
    /* Estiliza select, input de número y texto que genera Django */
    .form-group input, .form-group select {
        padding: 10px 14px;
        border: 1px solid #dce4ec;
        border-radius: 8px;
        font-size: 15px;
        color: #2c3e50;
        background-color: #f8fafc;
        transition: all 0.2s ease;
    }
    .form-group input:focus, .form-group select:focus {
        outline: none;
        border-color: #3498db;
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
    }
    .btn-submit {
        width: 100%;
        padding: 12px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease;
        margin-top: 10px;
    }
    .btn-submit:hover {
        background: #2980b9;
    }
    .error-text {
        color: #e74c3c;
        font-size: 12px;
        margin-top: 5px;
    }
</style>
{% endblock %}
