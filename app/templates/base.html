{% load static %} 
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}FeriApp{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="{% static 'css/styles.css' %}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'ferias:home' %}">🏪 FeriApp</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'ferias:lista_ferias' %}">Ferias</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'ferias:lista_emprendedores' %}">Emprendedores</a>
          </li>
          <!-- TODO: agregar links a Emprendedores e Inscripciones -->
        </ul>

        <div class="d-flex align-items-center ms-lg-3 mt-3 mt-lg-0 gap-2">
          {% if user.is_authenticated %}
            <form action="{% url 'ferias:logout' %}" method="post">
              {% csrf_token %}
              <button type="submit" class="btn btn-outline-warning btn-sm px-3">Cerrar Sesión</button>
            </form>
          {% else %}
          <a href="{% url 'ferias:login' %}" class="btn btn-outline-light btn-sm px-3">Iniciar Sesión</a>
          {% endif %}
        </div>

      </div>
    </div>
  </nav>

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-light text-center text-muted py-3 mt-5 border-top">
    <small>FeriApp 2026</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
